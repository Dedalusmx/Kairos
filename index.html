<!DOCTYPE html>  <html lang="es">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Kairós Core — Genera ingresos desde tu WhatsApp, sin vender</title>  
<link rel="preconnect" href="https://fonts.googleapis.com">  
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">  
<style>  
  :root {  
    --bg: #050a06;  
    --bg2: #080f09;  
    --green: #25d366;  
    --green-glow: rgba(37,211,102,0.35);  
    --green-dim: #1a9e4a;  
    --red: #e53e3e;  
    --red-dim: rgba(229,62,62,0.15);  
    --text: #e8f5e9;  
    --muted: #6b8c72;  
    --card: rgba(255,255,255,0.03);  
    --border: rgba(37,211,102,0.12);  
    --font-display: 'Syne', sans-serif;  
    --font-body: 'DM Sans', sans-serif;  
  }  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
background: var(--bg);
color: var(--text);
font-family: var(--font-body);
font-size: 16px;
line-height: 1.6;
overflow-x: hidden;
}

/* ─── NOISE OVERLAY ─── */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
pointer-events: none;
z-index: 0;
opacity: 0.4;
}

section { position: relative; z-index: 1; }

.container { max-width: 680px; margin: 0 auto; padding: 0 20px; }

/* ─── NAVBAR ─── */
nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
background: rgba(5,10,6,0.85);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(--border);
}
.nav-logo {
font-family: var(--font-display);
font-weight: 800;
font-size: 1.1rem;
color: var(--green);
letter-spacing: -0.5px;
}
.nav-logo span { color: var(--text); }
.nav-badge {
font-size: 0.7rem;
background: var(--red-dim);
border: 1px solid var(--red);
color: var(--red);
padding: 3px 10px;
border-radius: 20px;
letter-spacing: 0.5px;
text-transform: uppercase;
font-weight: 500;
animation: pulse-red 2s infinite;
}
@keyframes pulse-red {
0%,100% { opacity: 1; }
50% { opacity: 0.6; }
}

/* ─── HERO ─── */
#hero {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
padding: 100px 20px 60px;
text-align: center;
background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(37,211,102,0.07) 0%, transparent 70%);
}
.hero-eyebrow {
display: inline-block;
font-size: 0.72rem;
text-transform: uppercase;
letter-spacing: 2px;
color: var(--green);
background: rgba(37,211,102,0.08);
border: 1px solid var(--border);
padding: 5px 14px;
border-radius: 20px;
margin-bottom: 24px;
}
.hero-headline {
font-family: var(--font-display);
font-size: clamp(2.4rem, 10vw, 4rem);
font-weight: 800;
line-height: 1.05;
letter-spacing: -1.5px;
color: #fff;
margin-bottom: 18px;
}
.hero-headline .green { color: var(--green); }
.hero-subline {
font-size: 1.25rem;
color: var(--muted);
margin-bottom: 8px;
font-weight: 300;
}
.hero-subline strong { color: var(--text); font-weight: 500; }
#typing-word {
color: var(--green);
font-weight: 600;
border-right: 2px solid var(--green);
padding-right: 2px;
animation: blink 0.8s step-end infinite;
min-width: 80px;
display: inline-block;
}
@keyframes blink { 50% { border-color: transparent; } }

.hero-sub {
font-size: 0.95rem;
color: var(--muted);
max-width: 380px;
margin: 12px auto 28px;
line-height: 1.6;
}
.hero-bullets {
display: flex;
flex-direction: column;
gap: 8px;
align-items: center;
margin-bottom: 32px;
}
.hero-bullet {
display: flex;
align-items: center;
gap: 8px;
font-size: 0.9rem;
color: var(--text);
}
.hero-bullet::before {
content: '✓';
width: 20px; height: 20px;
background: rgba(37,211,102,0.15);
border: 1px solid var(--green);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.65rem;
color: var(--green);
flex-shrink: 0;
}

/* ─── BUTTONS ─── */
.btn-primary {
display: inline-block;
background: var(--green);
color: #000;
font-family: var(--font-display);
font-weight: 700;
font-size: 1rem;
padding: 16px 36px;
border-radius: 14px;
text-decoration: none;
border: none;
cursor: pointer;
box-shadow: 0 0 32px var(--green-glow), 0 4px 16px rgba(0,0,0,0.4);
transition: transform 0.15s, box-shadow 0.15s;
letter-spacing: -0.3px;
}
.btn-primary:hover {
transform: translateY(-2px) scale(1.02);
box-shadow: 0 0 48px var(--green-glow), 0 8px 24px rgba(0,0,0,0.5);
}
.btn-primary:active { transform: scale(0.98); }

/* ─── LIVE TICKER ─── */
.ticker-bar {
background: rgba(37,211,102,0.06);
border-top: 1px solid var(--border);
border-bottom: 1px solid var(--border);
padding: 12px 0;
overflow: hidden;
position: relative;
}
.ticker-inner {
display: flex;
gap: 40px;
white-space: nowrap;
animation: ticker 22s linear infinite;
}
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ticker-item {
font-size: 0.78rem;
color: var(--muted);
display: flex;
align-items: center;
gap: 6px;
flex-shrink: 0;
}
.ticker-item .dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(--green);
animation: pulse-dot 1.5s infinite;
}
@keyframes pulse-dot {
0%,100% { opacity: 1; transform: scale(1); }
50% { opacity: 0.4; transform: scale(0.7); }
}
.ticker-item strong { color: var(--green); }

/* ─── SECTION TITLES ─── */
.sec-label {
font-size: 0.7rem;
text-transform: uppercase;
letter-spacing: 2px;
color: var(--green);
margin-bottom: 10px;
}
.sec-title {
font-family: var(--font-display);
font-size: clamp(1.6rem, 6vw, 2.4rem);
font-weight: 800;
letter-spacing: -1px;
line-height: 1.1;
color: #fff;
margin-bottom: 12px;
}
.sec-sub {
font-size: 0.95rem;
color: var(--muted);
max-width: 420px;
margin: 0 auto 40px;
}

/* ─── DEMO WHATSAPP ─── */
#demo {
padding: 80px 0;
text-align: center;
}
.wapp-phone {
max-width: 340px;
margin: 0 auto;
background: #111b12;
border-radius: 28px;
overflow: hidden;
border: 1px solid rgba(37,211,102,0.2);
box-shadow: 0 0 60px rgba(37,211,102,0.1), 0 24px 48px rgba(0,0,0,0.6);
}
.wapp-header {
background: #1f2c20;
padding: 14px 16px;
display: flex;
align-items: center;
gap: 10px;
border-bottom: 1px solid rgba(255,255,255,0.05);
}
.wapp-avatar {
width: 36px; height: 36px;
border-radius: 50%;
background: linear-gradient(135deg, var(--green), #1a9e4a);
display: flex; align-items: center; justify-content: center;
font-size: 0.75rem;
font-weight: 700;
color: #000;
font-family: var(--font-display);
}
.wapp-name { font-size: 0.85rem; font-weight: 600; color: #fff; }
.wapp-status { font-size: 0.7rem; color: var(--green); }
.wapp-body {
padding: 14px 12px;
min-height: 380px;
display: flex;
flex-direction: column;
gap: 8px;
overflow: hidden;
}
.wapp-msg {
max-width: 78%;
padding: 9px 12px;
border-radius: 12px;
font-size: 0.82rem;
line-height: 1.45;
opacity: 0;
transform: translateY(10px);
transition: opacity 0.35s, transform 0.35s;
}
.wapp-msg.show { opacity: 1; transform: translateY(0); }
.wapp-msg.client {
align-self: flex-start;
background: #2a2f2a;
color: #ddd;
border-bottom-left-radius: 3px;
}
.wapp-msg.bot {
align-self: flex-end;
background: #1f3320;
color: #c8f0d0;
border-bottom-right-radius: 3px;
border: 1px solid rgba(37,211,102,0.15);
}
.wapp-msg.confirm {
align-self: flex-end;
background: linear-gradient(135deg, #1a4a24, #0d2e14);
border: 1px solid var(--green);
color: var(--green);
font-weight: 600;
font-size: 0.8rem;
max-width: 88%;
border-radius: 12px;
border-bottom-right-radius: 3px;
text-align: right;
}
.wapp-typing {
align-self: flex-end;
background: #1f3320;
padding: 10px 14px;
border-radius: 12px;
border-bottom-right-radius: 3px;
opacity: 0;
transition: opacity 0.3s;
display: flex; gap: 4px; align-items: center;
}
.wapp-typing.show { opacity: 1; }
.wapp-typing span {
width: 6px; height: 6px;
background: var(--green);
border-radius: 50%;
animation: typing-dot 1.2s infinite;
}
.wapp-typing span:nth-child(2) { animation-delay: 0.2s; }
.wapp-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-dot {
0%,80%,100% { transform: scale(0.7); opacity: 0.4; }
40% { transform: scale(1); opacity: 1; }
}
.wapp-tag {
font-size: 0.65rem;
color: var(--muted);
margin-top: 2px;
text-align: right;
}
.wapp-tag.left { text-align: left; }
.demo-restart {
font-size: 0.75rem;
color: var(--muted);
margin-top: 14px;
cursor: pointer;
text-decoration: underline;
background: none;
border: none;
color: var(--muted);
display: block;
margin: 12px auto 0;
}
.demo-restart:hover { color: var(--green); }

/* ─── PRODUCT INTRO ─── */
#product {
padding: 80px 0;
text-align: center;
background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(37,211,102,0.05) 0%, transparent 70%);
}
.product-card {
background: var(--card);
border: 1px solid var(--border);
border-radius: 20px;
padding: 32px 24px;
max-width: 480px;
margin: 0 auto;
position: relative;
overflow: hidden;
}
.product-card::before {
content: '';
position: absolute;
top: -1px; left: 20%; right: 20%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--green), transparent);
}
.product-icon {
width: 56px; height: 56px;
background: rgba(37,211,102,0.12);
border: 1px solid rgba(37,211,102,0.3);
border-radius: 16px;
display: flex; align-items: center; justify-content: center;
font-size: 1.5rem;
margin: 0 auto 16px;
}
.product-name {
font-family: var(--font-display);
font-size: 1.5rem;
font-weight: 800;
color: #fff;
letter-spacing: -0.5px;
margin-bottom: 6px;
}
.product-name .green { color: var(--green); }
.product-desc {
font-size: 0.9rem;
color: var(--muted);
line-height: 1.6;
margin-bottom: 20px;
}
.product-features {
display: flex;
flex-direction: column;
gap: 10px;
text-align: left;
}
.pf-item {
display: flex;
align-items: flex-start;
gap: 10px;
font-size: 0.88rem;
color: var(--text);
background: rgba(37,211,102,0.04);
border: 1px solid rgba(37,211,102,0.08);
padding: 10px 14px;
border-radius: 10px;
}
.pf-icon { color: var(--green); font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }

/* ─── HOW IT WORKS ─── */
#how {
padding: 80px 0;
text-align: center;
}
.steps {
display: flex;
flex-direction: column;
gap: 16px;
max-width: 480px;
margin: 0 auto;
}
.step {
background: var(--card);
border: 1px solid var(--border);
border-radius: 16px;
padding: 22px 20px;
display: flex;
align-items: flex-start;
gap: 16px;
text-align: left;
position: relative;
overflow: hidden;
transition: border-color 0.3s, background 0.3s;
}
.step:hover {
border-color: rgba(37,211,102,0.3);
background: rgba(37,211,102,0.03);
}
.step-num {
font-family: var(--font-display);
font-size: 2rem;
font-weight: 800;
color: rgba(37,211,102,0.15);
line-height: 1;
flex-shrink: 0;
width: 36px;
}
.step-content {}
.step-title {
font-family: var(--font-display);
font-size: 1rem;
font-weight: 700;
color: #fff;
margin-bottom: 4px;
}
.step-desc { font-size: 0.85rem; color: var(--muted); }
.step-arrow {
position: absolute;
right: 16px; top: 50%;
transform: translateY(-50%);
color: var(--green);
opacity: 0.5;
font-size: 0.9rem;
}

/* ─── SCARCITY ─── */
#scarcity {
padding: 70px 0;
text-align: center;
}
.scarcity-box {
background: linear-gradient(135deg, rgba(229,62,62,0.06), rgba(229,62,62,0.03));
border: 1px solid rgba(229,62,62,0.25);
border-radius: 20px;
padding: 32px 24px;
max-width: 480px;
margin: 0 auto;
position: relative;
overflow: hidden;
}
.scarcity-box::before {
content: '';
position: absolute;
top: -1px; left: 20%; right: 20%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--red), transparent);
}
.scarcity-icon { font-size: 2rem; margin-bottom: 12px; }
.scarcity-title {
font-family: var(--font-display);
font-size: 1.35rem;
font-weight: 800;
color: #fff;
margin-bottom: 10px;
letter-spacing: -0.5px;
}
.scarcity-text { font-size: 0.9rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.scarcity-rules {
display: flex;
flex-direction: column;
gap: 8px;
margin-bottom: 24px;
text-align: left;
}
.sr-item {
display: flex;
align-items: center;
gap: 10px;
font-size: 0.85rem;
color: var(--text);
padding: 8px 12px;
background: rgba(229,62,62,0.05);
border-radius: 8px;
}
.sr-item .sr-icon { color: var(--red); font-size: 0.85rem; }

/* ─── ACTIVITY / PROOF ─── */
#proof {
padding: 70px 0;
text-align: center;
}
.proof-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
max-width: 400px;
margin: 0 auto 28px;
}
.proof-stat {
background: var(--card);
border: 1px solid var(--border);
border-radius: 14px;
padding: 18px 14px;
}
.proof-stat .num {
font-family: var(--font-display);
font-size: 1.9rem;
font-weight: 800;
color: var(--green);
letter-spacing: -1px;
line-height: 1;
}
.proof-stat .label { font-size: 0.73rem; color: var(--muted); margin-top: 4px; }
.live-feed {
max-width: 400px;
margin: 0 auto;
display: flex;
flex-direction: column;
gap: 8px;
}
.lf-item {
background: var(--card);
border: 1px solid var(--border);
border-radius: 10px;
padding: 10px 14px;
display: flex;
align-items: center;
gap: 10px;
font-size: 0.8rem;
text-align: left;
opacity: 0;
transform: translateX(-10px);
transition: opacity 0.4s, transform 0.4s;
}
.lf-item.show { opacity: 1; transform: translateX(0); }
.lf-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse-dot 2s infinite; }
.lf-text { color: var(--text); flex: 1; }
.lf-time { color: var(--muted); font-size: 0.7rem; }

/* ─── NO NECESITAS ─── */
#noneed {
padding: 70px 0;
text-align: center;
}
.noneed-grid {
display: flex;
flex-direction: column;
gap: 10px;
max-width: 420px;
margin: 0 auto;
}
.noneed-item {
display: flex;
align-items: center;
gap: 12px;
background: var(--card);
border: 1px solid rgba(255,255,255,0.05);
border-radius: 12px;
padding: 14px 16px;
text-align: left;
font-size: 0.9rem;
color: var(--text);
}
.noneed-x {
width: 24px; height: 24px;
background: rgba(229,62,62,0.12);
border: 1px solid rgba(229,62,62,0.3);
border-radius: 6px;
display: flex; align-items: center; justify-content: center;
color: var(--red);
font-size: 0.7rem;
font-weight: 700;
flex-shrink: 0;
}

/* ─── FLOW MENTION ─── */
#flow {
padding: 60px 0;
text-align: center;
}
.flow-pill {
display: inline-flex;
align-items: center;
gap: 10px;
background: rgba(37,211,102,0.05);
border: 1px solid var(--border);
border-radius: 40px;
padding: 14px 24px;
font-size: 0.88rem;
color: var(--muted);
max-width: 400px;
}
.flow-pill strong { color: var(--green); }
.flow-pill .icon { font-size: 1.1rem; }

/* ─── CTA FINAL ─── */
#cta-final {
padding: 80px 0;
text-align: center;
background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(37,211,102,0.07) 0%, transparent 70%);
}
.cta-final-box {
max-width: 480px;
margin: 0 auto;
padding: 40px 24px;
background: var(--card);
border: 1px solid rgba(37,211,102,0.2);
border-radius: 24px;
position: relative;
overflow: hidden;
}
.cta-final-box::before {
content: '';
position: absolute;
top: -1px; left: 10%; right: 10%;
height: 2px;
background: linear-gradient(90deg, transparent, var(--green), transparent);
}
.spots-left {
display: inline-flex;
align-items: center;
gap: 6px;
background: var(--red-dim);
border: 1px solid rgba(229,62,62,0.3);
color: var(--red);
font-size: 0.75rem;
padding: 5px 12px;
border-radius: 20px;
margin-bottom: 20px;
animation: pulse-red 2s infinite;
}

/* ─── FORM ─── */
.lead-form {
display: flex;
flex-direction: column;
gap: 12px;
margin-top: 24px;
}
.form-input {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.1);
color: var(--text);
font-family: var(--font-body);
font-size: 0.95rem;
padding: 14px 16px;
border-radius: 12px;
outline: none;
transition: border-color 0.2s;
width: 100%;
}
.form-input::placeholder { color: var(--muted); }
.form-input:focus { border-color: var(--green); }
.form-note {
font-size: 0.72rem;
color: var(--muted);
text-align: center;
line-height: 1.5;
}
.form-note strong { color: var(--text); }

/* ─── SUCCESS STATE ─── */
.form-success {
display: none;
padding: 24px;
background: rgba(37,211,102,0.08);
border: 1px solid rgba(37,211,102,0.3);
border-radius: 14px;
text-align: center;
}
.form-success .check { font-size: 2rem; margin-bottom: 8px; }
.form-success h3 {
font-family: var(--font-display);
color: var(--green);
font-size: 1.1rem;
margin-bottom: 6px;
}
.form-success p { font-size: 0.85rem; color: var(--muted); }

/* ─── FOOTER ─── */
footer {
padding: 30px 20px;
text-align: center;
border-top: 1px solid var(--border);
font-size: 0.75rem;
color: var(--muted);
}

/* ─── STICKY CTA (mobile) ─── */
.sticky-cta {
position: fixed;
bottom: 0; left: 0; right: 0;
z-index: 98;
padding: 12px 20px;
background: rgba(5,10,6,0.92);
backdrop-filter: blur(12px);
border-top: 1px solid var(--border);
display: flex;
justify-content: center;
transform: translateY(100%);
transition: transform 0.4s ease;
}
.sticky-cta.visible { transform: translateY(0); }
.sticky-cta .btn-primary { width: 100%; max-width: 400px; text-align: center; }

/* ─── CHAT MODAL ─── */
.chat-fab {
position: fixed;
bottom: 80px; right: 20px;
z-index: 200;
width: 54px; height: 54px;
background: var(--green);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
box-shadow: 0 0 24px var(--green-glow), 0 4px 16px rgba(0,0,0,0.4);
border: none;
transition: transform 0.2s;
f
