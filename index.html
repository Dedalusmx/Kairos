<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metacompras</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* CONTENEDOR */
.container{
  padding:20px;
  padding-bottom:90px;
  text-align:center;
}

/* TITULO */
h2{
  margin-top:10px;
}

/* CTA */
.cta{
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin:20px 0;
}

/* GRIFO */
.faucet{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.faucet img{
  width:140px;
}

/* FLUJO */
.flow{
  width:100%;
  max-width:120px;
  height:120px;
  position:relative;
  overflow:hidden;
}

/* DINERO */
.money{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  animation:fall linear forwards;
}

@keyframes fall{
  from{top:0; opacity:1;}
  to{top:120px; opacity:0;}
}

/* TOGGLE */
.toggle{
  width:60px;
  height:30px;
  background:#1e293b;
  border-radius:999px;
  margin:20px auto;
  position:relative;
}

.toggle::after{
  content:'';
  width:26px;
  height:26px;
  background:white;
  position:absolute;
  top:2px;
  left:2px;
  border-radius:50%;
  transition:0.3s;
}

.toggle.active{
  background:#22c55e;
}

.toggle.active::after{
  left:32px;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Sistema que vende por ti</h2>

<button class="cta" onclick="openChat()">Activar ahora</button>

<div class="faucet">
  <img src="https://cdn.shopify.com/s/files/1/0602/2417/6173/files/image-56_jpg.png?v=1774992207">
  <div id="flow" class="flow"></div>
</div>

<p id="text">Modo gratis</p>

<div id="toggle" class="toggle"></div>

</div>

<nav>
  <button onclick="openChat()">💬 Chat</button>
  <button onclick="openChat()">🛒 Comprar</button>
</nav>

<script>
const flow = document.getElementById("flow");
const toggle = document.getElementById("toggle");
const text = document.getElementById("text");

let boost = false;

/* DINERO */
function drop(){
  const el = document.createElement("div");
  el.className="money";
  el.innerText="💰";
  el.style.animationDuration = (boost ? 800 : 2000) + "ms";
  flow.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

setInterval(drop,400);

/* TOGGLE */
toggle.onclick=()=>{
  boost=!boost;
  toggle.classList.toggle("active");
  text.innerText = boost ? "Modo boost 🔥" : "Modo gratis";
};

/* CHAT */
function openChat(){
  alert("Aquí conectas tu chat");
}
</script>

</body>
</html>
