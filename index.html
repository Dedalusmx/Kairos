<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metacompras</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
}

/* CONTENIDO */
.container{
  padding:20px;
  padding-bottom:90px;
}

/* CTA */
.cta{
  background:#22c55e;
  border:none;
  padding:14px;
  border-radius:10px;
  width:100%;
  font-weight:bold;
  margin:15px 0;
}

/* GRIFO */
.faucet{
  margin-top:20px;
}

.faucet img{
  width:140px;
}

.flow{
  height:120px;
  position:relative;
  overflow:hidden;
}

/* DINERO */
.money{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{top:0; opacity:1;}
  100%{top:120px; opacity:0;}
}

/* TOGGLE */
.toggle{
  width:60px;
  height:30px;
  background:#1e293b;
  border-radius:999px;
  margin:20px auto;
  position:relative;
  cursor:pointer;
}

.toggle::after{
  content:'';
  width:26px;
  height:26px;
  background:#fff;
  position:absolute;
  top:2px;
  left:2px;
  border-radius:50%;
  transition:0.3s;
}

.toggle.active{
  background:#22c55e;
}

.toggle.active::after{
  left:32px;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

nav button{
  background:none;
  border:none;
  color:white;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content{
  position:absolute;
  bottom:60px;
  width:100%;
  height:80%;
  background:#fff;
  border-radius:16px 16px 0 0;
  overflow:hidden;
  transform:translateY(100%);
  transition:0.3s;
}

.modal.show .modal-content{
  transform:translateY(0);
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Sistema que vende por ti</h2>

<button class="cta" onclick="openChat()">Activar ahora</button>

<div class="faucet">
  <img src="https://cdn.shopify.com/s/files/1/0602/2417/6173/files/image-56_jpg.png?v=1774992207">
  <div id="flow" class="flow"></div>
</div>

<p id="text">Modo gratis</p>

<div id="toggle" class="toggle"></div>

</div>

<nav>
  <button onclick="openChat()">💬 Chat</button>
  <button onclick="openChat()">🛒 Comprar</button>
</nav>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <iframe src="https://n8n-production-3be9.up.railway.app/webhook/fbdd43e5-4241-4192-9cc0-db29579c792f/chat"></iframe>
  </div>
</div>

<script>
const flow = document.getElementById("flow");
const toggle = document.getElementById("toggle");
const text = document.getElementById("text");

let boost = false;
let interval;

/* DINERO */
function dropMoney(speed){
  const el = document.createElement("div");
  el.className="money";
  el.innerText="💰";
  el.style.animationDuration = speed + "ms";
  flow.appendChild(el);
  setTimeout(()=>el.remove(), speed);
}

function start(){
  interval = setInterval(()=>{
    dropMoney(boost ? 800 : 2000);
  },300);
}

function stop(){
  clearInterval(interval);
  flow.innerHTML="";
}

start();

/* TOGGLE */
toggle.onclick=()=>{
  boost=!boost;
  toggle.classList.toggle("active");
  text.innerText = boost ? "Modo boost 🔥" : "Modo gratis";
};

/* CHAT */
function openChat(){
  const m = document.getElementById("modal");
  stop();
  m.style.display="block";
  setTimeout(()=>m.classList.add("show"),10);
}

document.getElementById("modal").onclick = function(e){
  if(e.target===this){
    this.classList.remove("show");
    setTimeout(()=>{
      this.style.display="none";
      start();
    },300);
  }
};
</script>

</body>
</html>
