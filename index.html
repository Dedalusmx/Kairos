<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metacompras</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:50;
  border-top:1px solid #1e293b;
}

/* CONTENT */
.container{
  padding:20px;
  padding-bottom:100px;
}

/* FAUCET */
.faucet-wrap{
  position:relative;
  height:260px;
}

.faucet-img{
  width:160px;
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
}

.flow-zone{
  position:absolute;
  top:90px;
  left:52%;
  width:120px;
  height:150px;
}

.money{
  position:absolute;
  left:57%;
  font-size:26px;
  animation:fall linear forwards;
  filter:drop-shadow(0 0 6px #22c55e);
}

@keyframes fall{
  0%{transform:translate(-50%,0);opacity:1;}
  100%{transform:translate(40px,140px);opacity:0;}
}

/* TOGGLE */
.toggle{
  width:70px;
  height:36px;
  background:#1e293b;
  border-radius:999px;
  margin:20px auto;
  position:relative;
  cursor:pointer;
}

.toggle::after{
  content:'';
  width:30px;
  height:30px;
  background:white;
  position:absolute;
  top:3px;
  left:3px;
  border-radius:50%;
  transition:0.3s;
}

.toggle.active{
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.toggle.active::after{
  left:37px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:40;
}

.modal-content{
  position:absolute;
  bottom:60px;
  width:100%;
  height:calc(100% - 60px);
  background:white;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  overflow:hidden;

  transform:translateY(100%);
  transition:0.3s;
}

.modal.show .modal-content{
  transform:translateY(0);
}

.close-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
  background:black;
  color:white;
  border:none;
  border-radius:50%;
  padding:8px 12px;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Sistema que vende por ti 24/7</h2>

<div class="faucet-wrap">
  <img src="https://cdn.shopify.com/s/files/1/0602/2417/6173/files/image-56_jpg.png?v=1774992207" class="faucet-img">
  <div id="flowZone" class="flow-zone"></div>
</div>

<p id="flowText">Gratis: flujo bajo</p>

<div id="toggle" class="toggle"></div>

</div>

<nav>
  <button onclick="openChat()">💬 Chat</button>
  <button>🛒 Comprar</button>
</nav>

<!-- MODAL -->
<div id="chatModal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeChat()">✕</button>
    <iframe src="https://n8n-production-3be9.up.railway.app/webhook/fbdd43e5-4241-4192-9cc0-db29579c792f/chat"></iframe>
  </div>
</div>

<script>
const flowZone = document.getElementById("flowZone");
const toggle = document.getElementById("toggle");
const text = document.getElementById("flowText");

let isBoost = false;
let intervalID = null;

const icons = ["💰","🪙","💵"];

/* ===== FLOW ===== */

function createMoney(speed=2000){
  const el = document.createElement("div");
  el.className="money";
  el.innerText = icons[Math.floor(Math.random()*icons.length)];
  el.style.animationDuration = speed+"ms";
  flowZone.appendChild(el);
  setTimeout(()=>el.remove(), speed);
}

function startFlow(){
  if(intervalID) return;

  intervalID = setInterval(()=>{
    if(isBoost){
      createMoney(900);
      createMoney(1000);
      createMoney(1100);
    } else {
      createMoney(2200);
    }
  },300);
}

function stopFlow(){
  clearInterval(intervalID);
  intervalID = null;
  flowZone.innerHTML = "";
}

startFlow();

/* ===== TOGGLE ===== */

toggle.onclick = ()=>{
  isBoost = !isBoost;
  toggle.classList.toggle("active");

  if(isBoost){
    text.innerText="Boost: ventas constantes 🔥";
    flowZone.style.filter="drop-shadow(0 0 10px #22c55e)";
  } else {
    text.innerText="Gratis: flujo bajo";
    flowZone.style.filter="none";
  }
};

/* ===== CHAT ===== */

function openChat(){
  const modal = document.getElementById("chatModal");

  stopFlow();

  modal.style.display="block";
  setTimeout(()=>modal.classList.add("show"),10);

  document.querySelector('.faucet-wrap').style.display="none";
  document.body.style.overflow="hidden";
}

function closeChat(){
  const modal = document.getElementById("chatModal");

  modal.classList.remove("show");

  setTimeout(()=>modal.style.display="none",300);

  document.querySelector('.faucet-wrap').style.display="block";
  document.body.style.overflow="auto";

  startFlow();
}

document.getElementById("chatModal").addEventListener("click", function(e){
  if(e.target === this){
    closeChat();
  }
});
</script>

</body>
</html>
